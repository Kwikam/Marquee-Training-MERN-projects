<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3x3 Grid - Different Item Positions</title>
    <style>
        .container {
            display: grid;
            grid-template-columns: 150px 150px 150px 150px 150px ;
            grid-template-rows: 150px 150px 150px 150px 150px;
            
            background-color: #ddd;
            padding: 20px;
            width: fit-content;
            margin: 50px auto;
        }
        
        .item {
            background-color: #105481;
            color: white;
            padding: 10px;
            
            
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .item1{
            grid-column:4;
            grid-row: 5;
            justify-self:center;
            align-items: center;

        }
        .item2{
            grid-column:4;
            grid-row: 4;
            justify-self:center;
            align-items: center;
        }
        .item3{
            grid-column:4;
            grid-row: 3;
            justify-self:center;
            align-items: center;
        }
        .item4{
            grid-column:4;
            grid-row: 2;
            justify-self:center;
            align-items: center;
        }
        .item5{
            grid-column:3;
            grid-row:1;
            justify-self:center;
            align-items: end;
        }
        .item6{
            grid-column:2;
            grid-row:2;
            justify-self:center;
            align-items: center;
        }
        .item7{
            grid-column:2;
            grid-row:3;
            justify-self:center;
            align-items: center;
        }
        .item8{
            grid-column:2;
            grid-row:4;
            justify-self:center;
            align-items: center;
        }
        .item9{
            grid-column:2;
            grid-row:5;
            justify-self:center;
            align-items: center;
        }
        .item10{
            grid-column:3;
            grid-row:3;
            justify-self:center;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item item1"></div>
        <div class="item item2"></div>
        <div class="item item3"></div>
        <div class="item item4"></div>
        <div class="item item5"></div>
        <div class="item item6"></div>
        <div class="item item7"></div>
        <div class="item item8"></div>
        <div class="item item9"></div>
        <div class="item item10"></div>
        

    
    </div>
</body>
</html>
