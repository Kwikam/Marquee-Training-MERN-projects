<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <style>
        .card{
            width: 300px;
            border: 1px solid #ccc;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        .profile-pic img{
            width: 100px;
            height: 100px;
            border-radius: 50%;
        }
        .profile-name h2{
            margin: 10px 0 5px;
        }
        .profile-name p{
            margin: 0;
            color: gray;
        }
        .Social-handles a{
            display: inline-block;
            margin: 10px;
            text-decoration: none;
            color: #0073b1; 
        }
        .message-box{
            display:flex;
            justify-content:center;
            gap:20px;
            margin-top:20px;
        }
        .subscribe-button button,
        .Message button{
            padding:10px 20px;
            border:none;
            border-radius:5px;
            background-color:#0073b1; 
            color:white;
            cursor:pointer;
        }
        .stats-count-icons{
            display:flex;
            justify-content:center;
            gap:30px;
            margin-top:20px;
        }
        .stats-count-icons div{
            text-align:center;
        }
    </style>

</head>
<body>
    <div class="card">
        <div class="Upper-box">
            <div class="profile-pic">
                <img src="𓆩♡𓆪.jpg"alt="Profile Picture">
            </div>
            
        </div>
        <div class="profile-name">
                <h2>Atanu Ghosh</h2>
                <p>Web Developer</p>
        </div>
    <div class="Social-handles">
            <a href="#" target="_blank">LinkedIn</a>
                <img src="" alt="LinkedIn Icon">
            <a href="#" target="_blank">Twitter</a>
            <a href="#" target="_blank">GitHub</a>
        </div>
    
    <div class="message-box">
        <div class="subscribe-button">
            <button>Subscribe</button>
        </div>
        <div class="Message">
            <button>Message</button>
        </div>
    
    </div>

    <div class="stats-count-icons">
        <div class="Likes">
            <h3>Likes</h3>
            <p>1.2K</p>
        </div>
        <div class="Messages">
            <h3>Messages</h3>
            <p>500</p>
        </div>
        <div class="Shares">
            <h3>Shares</h3>
            <p>150</p>
        </div>

    </div>
    </div>
    
</body>
</html>
