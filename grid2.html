<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 100px);
            grid-template-rows: repeat(4, 100px);
            gap: 10px;
            width: 500px;
            height: 500px;
            margin: 0 auto;


        }
        .box1 {
            background-color: blue;
            grid-column: 1 / 1;
            grid-row: 1 / 4;
        }
        .box2{ 
            background-color: red;
            grid-column: 2/ 5;
            grid-row: 1 / 2;
        }
        .box3{
            background-color: rgb(238, 144, 216);
            grid-column: 2 / 5;
            grid-row: 2/ 3;
        }
        .box4{
            background-color: rgb(245, 255, 182);
            grid-column: 2/ 5;
            grid-row: 3/ 3;
        }
        .box11{
            background-color: aqua;
            grid-column:1/5;
            grid-row:1/2;
        }
        .box12{
            background-color: blanchedalmond;
            grid-column: 1/3;
            grid-row:2/3;


        }
        .box13{
            background-color:palegreen ;
            grid-column: 3/5;
        }
        .box14{
            background-color: palevioletred;
            grid-column: 1/3;
        }
        .box15{
            background-color:orange;
            grid-column: 3/5;
        }

        .box21{
            background-color: greenyellow;
            grid-column: 1/3;
            grid-row:1/4;
        }
        .box22{
            background-color: aquamarine;
            grid-column:3/5;
        }
        .box23{
            background-color:red;
            grid-column: 3/5;

        }
        .box24{
            background-color: brown;
            grid-column: 3/5;

        }
        .box25{
            background-color: aquamarine;
            grid-column: 1/5;
        }

    </style>
</head>
<body>
    <div class="grid-container">
        <div class="box1">1</div>
        <div class="box2">2</div>
        <div class="box3">3</div>
        <div class="box4">4</div>
        
    </div>
    <div class="grid-container">
        <div class="box11">1</div>
        <div class="box12">2</div>
        <div class="box13">3</div>
        <div class="box14">4</div>
        <div class="box15">5</div>
        
    </div>
    <div class="grid-container">
        <div class="box21">1</div>
        <div class="box22">2</div>
        <div class="box23">3</div>
        <div class="box24">4</div>
        <div class="box25">5</div>
        
    </div>

    
</body>
</html>
