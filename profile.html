<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Structure</title>
    <style>
        .big-box {
            width: 400px;
            background: lightgray;
            padding: 20px;
            margin: 50px auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .top {
            display: flex;
            gap: 20px;
        }

        .circle {
            width: 80px;
            height: 80px;
            background: purple;
            border-radius: 50%;
            align-self: center;
            overflow: hidden;
        }
        .circle img{
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .square {
            width: 300px;
            height: 80px;
            background: green;
            overflow: hidden;
            align-self: center;
            
        }
        .sqaure img{
            width: 10%;
            height: 10%;
            object-fit: cover;
        }

        .center {
            display: flex;
            gap: 20px;
            width: 100%;
            flex:1;
        }

        .left {
            flex: 1;
            
            height: 80px;
            background: red;
        }

        .right {
            flex: 1;
            height: 80px;
            width:150px;
            background: orange;
        }

        .bottom {
            display: flex;
            gap: 15px;
        }
        .bottom-square {
            width: 120px;
            height: 80px;
            background: blue;
        }
    </style>
</head>
<body>

<div class="big-box">
    <div class="top">
        <div class="circle">
            <img src="𓆩♡𓆪.jpg" alt="Profile Picture">
        </div>

        <div class="square">
            <img src="wallhaven-gpk89e_1920x1080.png" alt="Cover Photo">
        </div>
    </div>

    <div class="center">
        <div class="left"></div>
        <div class="right"></div>
    </div>

    <div class="bottom">
        <div class="bottom-square"></div>
        <div class="bottom-square"></div>
        <div class="bottom-square"></div>
    </div>
</div>

</body>
</html>
