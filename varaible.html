<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box on Box Structure</title>
    <style>
        .box {
            width: 300px;
            background: lightgray;  
            padding: 20px;
            margin: 50px auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            border-radius: 10px;
        }

        .top {
            display: flex;
            gap: 20px;
        }

        .box1 {
            width: 80px;
            height: 80px;
            background: yellow;
        }

        .box2 {
            width: 80px;
            height: 80px;
            background: orange;
        }

        .center {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .box3 {
            width: 200px;
            height: 100px;
            background: blue;
        }

        .bottom {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .circle {
            width: 50px;
            height: 50px;
            background: red;
            border-radius: 50%;
        }
    </style>
</head>
<body>

<div class="box">
    <div class="top">
        <div class="box1"></div>
        <div class="box2"></div>
    </div>

    <div class="center">
        <div class="box3"></div>
    </div>

    <div class="bottom">
        <div class="circle"></div>
    </div>
</div>

</body>
</html>
