<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 100px);
            grid-template-rows: repeat(4, 100px);
            gap: 10px;
            width: 500px;
            height: 500px;
            margin: 0 auto;


        }
        .box1 {
            background-color: blue;
            grid-column: 1 / 3;
            grid-row: 1 / 3;
        }
        .box2{ 
            background-color: red;
            grid-column: 3 / 5;
            grid-row: 1 / 2;
        }
        .box3{
            background-color: rgb(238, 144, 216);
            grid-column: 4 / 5;
            grid-row: 2/ 3;
        }
        .box4{
            background-color: rgb(245, 255, 182);
            grid-column: 3 / 4;
            grid-row: 2 / 3;
        }
        .box5{
            background-color: rgb(100, 21, 197);
            grid-column: 4 / 5;
            grid-row: 1/2;
        }
        .box6{
            background-color: rgb(238, 135, 135);
            grid-column: 1 / 5;
            grid-row: 3 / 5;
        }

    </style>
</head>
<body>
    <div class="grid-container">
        <div class="box1">1</div>
        <div class="box2">2</div>
        <div class="box3">3</div>
        <div class="box4">4</div>
        <div class="box5">5</div>
        <div class="box6">6</div>
    </div>

    
</body>
</html>
