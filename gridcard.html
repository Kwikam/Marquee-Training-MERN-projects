<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style> 
        .grid-container{
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
            font-family: italic;
            background-color: rgb(151, 88, 166);
                width: 500px;
                height: 500px;
                margin: 0 auto;
            justify-content: center;
            


              
           


        }

        .box1{
            background-color: rgb(89, 51, 136);
            grid-column: 1 / 2; 
            grid-row: 1 / 2; 
            border-radius: 20px;
            text-align: center;
            color: white;
            font-size: 20px;
            overflow: hidden;
        }
        .box1 img{
            width: 100%;
            height: auto;
        }
        .box2{
            background-color: rgb(58, 23, 104);
            grid-column: 2 / 3; 
            grid-row: 1 / 2; 
            border-radius: 20px;
            text-align: center;
            color: white;
            padding: 5px;
            font-size: 20px;
        }
        

        
        .box3{
            background-color: rgb(177, 21, 191);
            grid-column: 3 / 4; 
            grid-row: 1 / 2; 
            border-radius: 20px;
            text-align: center;
            color: white;
            font-size: 20px;
            
        }
        .box4{
            background-color: rgb(84, 4, 221);
            grid-column: 1/ 2; 
            grid-row: 2/ 3; 
            border-radius: 20px;
            text-align: center;
            color: white;
        }
        .box5{
            background-color: rgb(62, 43, 119);
            grid-column: 2/ 3; 
            grid-row: 2 / 3; 
            border-radius: 20px;
            text-align: center;
            color: white;
        }
        .box6{
            background-color: rgb(218, 228, 212);
            grid-column: 3 / 4; 
            grid-row: 2 / 4; 
            border-radius: 20px;
            text-align: center;
            color:black;
        }
        .box6 h1{
            margin-top: 250px;
            margin-right:40px;
        }
        .box6 p{
            margin-top: 20px;
            margin-right:40px;
            
        }
        .box7{
            background-color: rgb(101, 87, 168);
            grid-column: 1 / 3; 
            grid-row: 3/ 4; 
            border-radius: 20px;
            color: white;
            font-size: 25px;
        }
        
    </style>
</head>
<body>
    <div class="grid-container">
        <div class="box1">
            <p>Family of apps</p>
            <img src="download.png" alt="mediapps">
        </div>

        <div class="box2">
            
            <p>25K</p>
            <p>Weekly Likes</p>
        </div>
        <div class="box3">
            <p>10K</p>
            <p>Weekly Viewers</p>
        </div>
        <div class="box4">
            
            <p>Active Users</p>
            <h1>500K</h1>
        </div>
        <div class="box5">
            <h1>Design</h1>
        </div>
        <div class="box6">
            <p>Total Subscribers</p>
            <h1>200K</h1>
        </div>
        <div class="box7">
            <p>A place to learn UI design and web design</p>
        </div>
    </div>
</body>
</html>
