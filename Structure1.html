<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .container{
        height: 800px;
        width: 700px;
        background-color: white;
        
        
        padding: 10px;
        display: grid;
        grid-template-columns: repeat(4,1fr);
        grid-template-rows: repeat(7,1fr);
        gap: 5px;
    }
    .box{
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 23px;
        font-weight: bold;
        color: black;
    }
    .a{
        grid-row: 1/8;
        grid-column: 1/2;
        background-color: rgb(103, 103, 181);
    }
    .b{
        grid-row: 1/2;
        grid-column: 2/5;
        background-color: rgb(238, 144, 144);
    }
    .c{
        grid-row: 2/3;
        grid-column: 2/3;
        background-color: rgb(63, 154, 47);
    }
    .d{
        grid-row: 2/3;
        grid-column: 3/4;
        background-color: rgb(165, 166, 69);
    }
    .e{
        grid-row: 2/3;
        grid-column: 4/5;
        background-color: rgb(97, 132, 155);
    }
    .f{
        grid-row: 3/6;
        grid-column: 2/4;
        background-color: rgb(197, 238, 14);
    }
    .g{
        grid-row: 3/6;
        grid-column: 4/5;
        background-color: rgb(149, 21, 100);
    }
    .h{
        grid-row: 6/8;
        grid-column: 2/3;
        background-color: rgba(49, 133, 24, 0.185);
    }
    .i{
        grid-row: 6/8;
        grid-column: 3/4;
        background-color: gray;
    }
    .j{
        grid-row: 6/8;
        grid-column: 4/5;
        background-color: gray;
    }
</style>
<body>
    <div class="container">
        <div class="box a">Sidebar</div>
        <div class="box b">Tap Navigation</div>
        <div class="box c">Users 12,450</div>
        <div class="box d">Revenue $24,800</div>
        <div class="box e">Orders 1,234</div>
        <div class="box f">Chart(span 2)</div>
        <div class="box g">Table</div>
        <div class="box h">Widget 1</div>
        <div class="box i">Widget 2</div>
        <div class="box j">Widget 3</div>
    </div>
</body>
</html>
