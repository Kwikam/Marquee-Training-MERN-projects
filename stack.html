<!DOCTYPE html>
<html>
<head>
    <style>
        .box {
            width: 80px;
            height: 80px;
            border: 2px solid black;
            background-color: rgb(18, 17, 21);
            margin-left: 400px;
            position: relative;
            text-align: center;
            line-height: 80px;
            font-size: 20px;
        }
        #box1 {
            left: 0px;
            top: 0px;
            z-index: 6;
        }
        #box2 {
            left: 50px;
            top: -20px;
            z-index: 5;
        }
        #box3 {
            left: 100px;
            top: -40px;
            z-index: 4;
        }
        #box4 {
            left: 150px;
            top: -60px;
            z-index: 3;
        }
        #box5 {
            left: 200px;
            top: -80px;
            z-index: 2;
        }
        #box6 {
            left: 250px;
            top: -100px;
            z-index: 1;
        }
        
    </style>
</head>
<body>
    <div id="box1" class="box">1</div>
    <div id="box2" class="box">2</div>
    <div id="box3" class="box">3</div>
    <div id="box4" class="box">4</div>
    <div id="box5" class="box">5</div>
    <div id="box6" class="box">6</div>
    <div id="box1" class="box">1</div>

    <div id="box3" class="box">3</div>
    <div id="box4" class="box">4</div>
    <div id="box5" class="box">5</div>
    <div id="box6" class="box">6</div>
</body>
</html>\
