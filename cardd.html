<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <style>
        .card{
            width: 300px;
            border: 1px solid #ccc;
            border-radius: 10px;
            padding: 20px;
            align-items: center;
            
            text-align: center;
            

        
            
            
            
        }
        .profile-pic img{
            width: 100px;
            height: 100px;
            border-radius: 50%;
        }
        
        .profile-box {
            background-color: #0073b1;
            width: 300px;
            height: 120px;
            border-radius: 10px;
            margin: 0 ;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .profile-name h2{
            margin: 10px 0 5px;
        }
        .profile-name p{
            margin: 0;
            color: gray;
        }
        .Social-handles a{
            display: inline-block;
            margin: 10px;
            text-decoration: none;
        }
       
        .Social-handles img {
            width: 30px;
            height: 30px;
            border-radius: 30px;
        }
        .message-box{
            display:flex;
            justify-content:center;
            gap:20px;
            margin-top:20px;
        }
        .subscribe-button button,
        .Message button{
            padding:10px 20px;
            border:none;
            border-radius:20px;
            background-color:#0073b1; 
            color:white;
            cursor:pointer;
        }
        .stats-count-icons{
            display:flex;
            justify-content:center;
            gap:30px;
            margin-top:20px;
        }
        .stats-count-icons div{
            text-align:center;
        }
        
        .stat-icon {
            width: 25px;
            height: 25px;
            display: block;
            margin: 0 auto 5px;
            border-radius: 50%;
        }
    </style>

</head>
<body>
    <div class="card">
        <div class="Upper-box">
            
            <div class="profile-box">
                <div class="profile-pic">
                    <img src="𓆩♡𓆪.jpg" alt="Profile Picture">
                </div>
            </div>
        </div>
        <div class="profile-name">
            <h2>Atanu Ghosh</h2>
            <p>Web Developer</p>
        </div>
        
        <div class="Social-handles">
            <a href="#" target="_blank">
                <img src="lindin.png" alt="LinkedIn">
            </a>
            <a href="#" target="_blank">
                <img src="twitter.png" alt="Twitter">
            </a>
            <a href="#" target="_blank">
                <img src="github.png" alt="GitHub">
            </a>
        </div>
    
        <div class="message-box">
            <div class="subscribe-button">
                <button>Subscribe</button>
            </div>
            <div class="Message">
                <button>Message</button>
            </div>
        </div>

        <div class="stats-count-icons">
            <div class="Likes">
                <img class="stat-icon" src="like.png" alt="like icon">
                
                <p>1.2K</p>
            </div>
            <div class="Messages">
                <img class="stat-icon" src="message.png" alt="message icon">
                
                <p>500</p>
            </div>
            <div class="Shares">
                <img class="stat-icon" src="share.png" alt="share icon">
                
                <p>150</p>
            </div>
        </div>
    </div>
    
</body>
</html>
