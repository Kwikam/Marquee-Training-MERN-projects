<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Style Layout</title>
    <style>
        .big-box {
            width: 500px; 
            background: lightgray;
            padding: 20px;
            margin: 50px auto ;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .t-box {
            display: flex;
            gap: 20px;
        }
        
        .square {
            width: 150px ;
            height: 80px;
            background: yellow;
            border-radius: 30px;
            overflow: hidden;

        }
        .square img{
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .s-box {
            display: flex;
            gap: 20px;
            align-items: center;  /* Centers items vertically */
        }
        
        .search {
            width: 300px;  /* Made wider like Amazon search */
            height: 40px;
            background: white;
            border-radius: 10px;
            border: 1px solid #ccc;
        }
        
        .bb-s {
            width: 40px;
            height: 40px;
            background: orange;
            border-radius: 10px;
        }
        
        .i-box {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;  /* Allows items to wrap if needed */
        }
        
        .i1, .i2, .i3, .i4, .i5, .i6 {
            width: 80px;
            height: 80px;
            background: green;
            border-radius: 20px;
        }
        
        .c-box {
            display: flex;
            gap: 20px;
        }
        
        .c1, .c2, .c3 {
            width: 150px;
            height: 80px;
            background: purple;
            border-radius: 20px;
        }
    </style>
</head>
<body>

<div class="big-box">
    <div class="t-box">
        <div class="square">
            <img src="images.png" alt="logo">
        </div>
            
        <div class="square"></div>
    </div>

    <div class="s-box">
        <div class="search"></div>
        <div class="bb-s"></div>
        <div class="bb-s"></div>
        <div class="bb-s"></div>
    </div>

    <div class="i-box">
        <div class="i1"></div>
        <div class="i2"></div>
        <div class="i3"></div>
        <div class="i4"></div>
        <div class="i5"></div>
        
    </div>

    <div class="c-box">
        <div class="c1"></div>
        <div class="c2"></div>
        <div class="c3"></div>
    </div>
</div>

</body>
</html>
