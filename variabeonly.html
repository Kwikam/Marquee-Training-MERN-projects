<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Easy Size Changes with Variables</title>
    <style>
        :root {
           
            
            --box-width: 400px;     
            --square-size: 100px;    
            --rect-width: 250px;     
            --rect-height: 120px;    
            --circle-size: 70px;  
            --box-bg: lightgray;    
            --square1-bg: yellow;   
            --square2-bg: orange;   
            --rect-bg: blue;         
            --circle-bg: red;
            --box-gap: 20px;       
            --box-padding: 20px;         
            
            
            
            
            
               
        }
        
        .box {
            width: var(--box-width);
            background: var(--box-bg);
            padding: var(--box-padding);
            margin: 50px auto;
            display: flex;
            flex-direction: column;
            gap: var(--box-gap);
            align-items: center;
        }

        .top {
            display: flex;
            gap: var(--box-gap);
        }

        .box1 {
            width: var(--square-size);
            height: var(--square-size);
            background: var(--square1-bg);
        }

        .box2 {
            width: var(--square-size);
            height: var(--square-size);
            background: var(--square2-bg);
        }

        .box3 {
            width: var(--rect-width);
            height: var(--rect-height);
            background: var(--rect-bg);
        }

        .circle {
            width: var(--circle-size);
            height: var(--circle-size);
            background: var(--circle-bg);
            border-radius: 50%;
        }
    </style>
</head>
<body>

<div class="box">
    <div class="top">
        <div class="box1"></div>
        <div class="box2"></div>
    </div>
    <div class="center">
        <div class="box3"></div>
    </div>
    <div class="bottom">
        <div class="circle"></div>
    </div>
</div>

</body>
</html>
